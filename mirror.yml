name: gh
target:
  registry: ocx.sh
  repository: gh

source:
  type: github_release
  owner: cli
  repo: cli
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "^gh_\\d+\\.\\d+\\.\\d+_linux_amd64\\.tar\\.gz$"
  linux/arm64:
    - "^gh_\\d+\\.\\d+\\.\\d+_linux_arm64\\.tar\\.gz$"
  darwin/amd64:
    - "^gh_\\d+\\.\\d+\\.\\d+_macOS_amd64\\.zip$"
  darwin/arm64:
    - "^gh_\\d+\\.\\d+\\.\\d+_macOS_arm64\\.zip$"
  windows/amd64:
    - "^gh_\\d+\\.\\d+\\.\\d+_windows_amd64\\.zip$"
  windows/arm64:
    - "^gh_\\d+\\.\\d+\\.\\d+_windows_arm64\\.zip$"

# Linux + macOS tarballs/zips wrap the payload in a versioned dir
# (gh_X.Y.Z_<os>_<arch>/bin/gh) → strip 1. The Windows zip is flat
# (bin/gh.exe at root) → strip 0. Both land bin/ under the content root,
# so a single metadata.json (PATH = ${installPath}/bin) serves all.
asset_type:
  default:
    type: archive
    strip_components: 1
  platforms:
    windows/amd64:
      type: archive
      strip_components: 0
    windows/arm64:
      type: archive
      strip_components: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "2.76.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    runner: macos-latest
    prefix: ["arch", "-x86_64"]
  darwin/arm64:
    runner: macos-latest
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
